<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 750px; }
        
        .editor-wrapper { position: relative; width: 100%; min-height: 150px; border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; overflow: hidden; }
        
        /* جعل الخطوط تتغير ديناميكياً حسب اللغة */
        [dir="rtl"] .layer { font-family: 'Amiri', serif; font-size: 32px; text-align: right; }
        [dir="ltr"] .layer { font-family: sans-serif; font-size: 24px; text-align: left; }
        
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; line-height: 2.5; white-space: pre-wrap; margin: 0; border: none; }
        .background-text { color: #cbd5e1; z-index: 1; }
        .overlay-text { z-index: 2; color: black; }
        .input-textarea { z-index: 3; background: transparent; color: transparent; caret-color: #3b82f6; outline: none; resize: none; width: 100%; }
        
        .wrong-char { color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="editor-wrapper">
        <div class="layer background-text" id="bgText">بَراءَةٌ مِنَ اللَّهِ وَرَسولِهِ إِلَى الَّذينَ عاهَدتُم مِنَ المُشرِكينَ</div>
        <div class="layer overlay-text" id="overlayText"></div>
        <textarea class="layer input-textarea" id="userInput" spellcheck="false"></textarea>
    </div>
    <button onclick="toggleLang()" style="margin-top:10px; cursor:pointer;">تبديل اللغة / Switch Language</button>
</div>

<script>
    let isArabic = true;
    function toggleLang() {
        isArabic = !isArabic;
        const html = document.getElementById('htmlTag');
        const bg = document.getElementById('bgText');
        
        if (isArabic) {
            html.dir = "rtl";
            bg.innerText = "بَراءَةٌ مِنَ اللَّهِ وَرَسولِهِ إِلَى الَّذينَ عاهَدتُم مِنَ المُشرِكينَ";
        } else {
            html.dir = "ltr";
            bg.innerText = "Freedom from Allah and His Messenger to those who have made a treaty with the polytheists";
        }
        document.getElementById('userInput').value = "";
        document.getElementById('overlayText').innerHTML = "";
    }

    const input = document.getElementById('userInput');
    input.addEventListener('input', () => {
        const val = input.value;
        const target = document.getElementById('bgText').innerText;
        let html = "";
        for (let i = 0; i < val.length; i++) {
            if (val[i] === target[i]) {
                html += `<span>${val[i]}</span>`;
            } else {
                html += `<span class="wrong-char">${val[i]}</span>`;
            }
        }
        document.getElementById('overlayText').innerHTML = html;
    });
</script>
</body>
</html>
