<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المحاكاة | Typing Simulator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Amiri Quran', Georgia, serif; /* استخدام خطوط كلاسيكية متناسقة للغتين */
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 750px;
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .editor-wrapper {
            position: relative;
            width: 100%;
            min-height: 200px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            padding: 20px;
            overflow: hidden;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px; 
            font-family: 'Amiri Quran', Georgia, serif;
            font-size: 32px; /* نفس الحجم الكبير للغتين */
            line-height: 2.5; /* نفس التباعد المريح للأسطر */
            white-space: pre-wrap;
            margin: 0;
            border: none;
        }

        /* تغيير اتجاه المحاذاة فقط حسب اللغة مع الحفاظ على الشكل */
        html[dir="rtl"] .layer { text-align: right; }
        html[dir="ltr"] .layer { text-align: left; }

        .background-text { color: #cbd5e1; z-index: 1; pointer-events: none; }
        .overlay-text { z-index: 2; pointer-events: none; }
        
        .input-textarea {
            z-index: 3;
            background: transparent;
            color: transparent;
            caret-color: #3b82f6;
            outline: none;
            resize: none;
            display: block;
        }

        .correct-char { color: #000000 !important; }
        .wrong-char { color: #94a3b8 !important; }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .stats { font-size: 16px; color: #94a3b8; font-weight: 600; }
        
        .btn { 
            font-family: 'Amiri Quran', Georgia, serif; 
            font-size: 16px; 
            font-weight: 600; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            color: #64748b; 
            cursor: pointer; 
            padding: 6px 16px;
            border-radius: 8px;
        }
        .btn:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <button id="langToggle" class="btn">English 🌐</button>
    </div>

    <div class="editor-wrapper">
        <div class="layer background-text" id="bgText">بَراءَةٌ مِنَ اللَّهِ وَرَسولِهِ إِلَى الَّذينَ عاهَدتُم مِنَ المُشرِكينَ</div>
        <div class="layer overlay-text" id="overlayText"></div>
        <textarea class="layer input-textarea" id="userInput" spellcheck="false" autocomplete="off"></textarea>
    </div>

    <div class="bottom-bar">
        <div class="stats" id="wordCount">عدد الكلمات: 0</div>
        <button id="changeTextBtn" class="btn">تغيير النص ⚙️</button>
    </div>
</div>

<script>
    const htmlTag = document.getElementById('htmlTag');
    const bgText = document.getElementById('bgText');
    const overlayText = document.getElementById('overlayText');
    const userInput = document.getElementById('userInput');
    const wordCount = document.getElementById('wordCount');
    const langToggle = document.getElementById('langToggle');
    const changeTextBtn = document.getElementById('changeTextBtn');

    const diacritics = ['\u064B', '\u064C', '\u064D', '\u064E', '\u064F', '\u0650', '\u0651', '\u0652', '\u0670'];

    const langData = {
        ar: {
            text: "بَراءَةٌ مِنَ اللَّهِ وَرَسولِهِ إِلَى الَّذينَ عاهَدتُم مِنَ المُشرِكينَ",
            toggleBtnText: "English 🌐",
            changeBtnText: "تغيير النص ⚙️",
            wordCountLabel: "عدد الكلمات:"
        },
        en: {
            text: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
            toggleBtnText: "عربي 🌐",
            changeBtnText: "Change Text ⚙️",
            wordCountLabel: "Words:"
        }
    };

    let currentLang = 'ar';

    // تبديل اللغات مع الحفاظ الثابت على التصميم
    langToggle.addEventListener('click', () => {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        
        htmlTag.setAttribute('lang', currentLang);
        htmlTag.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
        
        langToggle.innerText = langData[currentLang].toggleBtnText;
        changeTextBtn.innerText = langData[currentLang].changeBtnText;
        bgText.innerText = langData[currentLang].text;
        
        userInput.value = '';
        overlayText.innerHTML = '';
        wordCount.innerText = `${langData[currentLang].wordCountLabel} 0`;
    });

    // طريقة التلوين والمحاكاة الموحدة
    userInput.addEventListener('input', () => {
        const inputText = userInput.value;
        const originalText = bgText.innerText;
        let htmlContent = "";

        if (currentLang === 'ar') {
            const originalWords = originalText.split(" ");
            const inputWords = inputText.split(" ");

            for (let w = 0; w < inputWords.length; w++) {
                const currentInWord = inputWords[w];
                const currentOrigWord = originalWords[w] || "";
                let inIdx = 0;
                let origIdx = 0;

                while (inIdx < currentInWord.length) {
                    const inChar = currentInWord[inIdx];
                    const origChar = currentOrigWord[origIdx] || "";
                    if (inChar === origChar || (origChar === "" && inChar !== "")) {
                        htmlContent += `<span class="correct-char">${inChar}</span>`;
                        inIdx++; origIdx++;
                    } else if (diacritics.includes(inChar)) {
                        htmlContent += `<span class="wrong-char">${inChar}</span>`;
                        inIdx++;
                    } else if (diacritics.includes(origChar)) {
                        origIdx++;
                    } else {
                        htmlContent += `<span class="wrong-char">${inChar}</span>`;
                        inIdx++; origIdx++;
                    }
                }
                if (w < inputWords.length - 1) htmlContent += " ";
            }
        } else {
            // التلوين المتطابق للحروف الإنجليزية فوق النص الأصلي تماماً
            for (let i = 0; i < inputText.length; i++) {
                if (i < originalText.length) {
                    if (inputText[i] === originalText[i]) {
                        htmlContent += `<span class="correct-char">${inputText[i]}</span>`;
                    } else {
                        htmlContent += `<span class="wrong-char">${inputText[i]}</span>`;
                    }
                }
            }
        }
        
        overlayText.innerHTML = htmlContent;
        const count = inputText.trim() === "" ? 0 : inputText.trim().split(/\s+/).length;
        wordCount.innerText = `${langData[currentLang].wordCountLabel} ${count}`;
    });
</script>
</body>
</html>
